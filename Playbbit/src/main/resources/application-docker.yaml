spring:
  datasource:
    url: jdbc:postgresql://infra-postgres-1:5432/${PLAYBBIT_DB}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: infra-redis-1
      port: 6379

minio:
  endpoint: http://infra-minio-1:9000
  external-url: ${MINIO_EXTERNAL_URL:}
  accessKey: ${MINIO_ACCESS_KEY}
  secretKey: ${MINIO_SECRET_KEY}
  region: ${MINIO_REGION:us-east-1}
  bucket: pbs

app:
  stream:
    ingest-base-url: "rtmp://infra-ingest-1:1935/live"
