worker_processes auto;
events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4000;

        # application live {
        #     live on;
        #     record off;

        #     # Webhook: Called when a user hits Start Streaming in OBS
        #     # Replace 'orchestrator' with your Spring Boot service name later
        #     on_publish http://10.163.36.24:8080/validate;

        #     # Webhook: Called when the stream stops
        #     on_publish_done http://10.163.36.24:8080/done;
        # }
        application live {
            live on;
            record off;


            # Use the service name 'api' defined in your docker-compose
            on_publish http://api:8080/validate; # Ensure this path is correct in your Controller
            on_publish_done http://api:8080/done;
        }
    }
}

http {
    resolver 127.0.0.11;
    server {
        listen 80;
        location /stat {
            rtmp_stat all;
        }
    }
}
