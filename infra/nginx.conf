worker_processes auto;
events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4000;

        application live {
            live on;
            record off;

            # Native HLS generation — segments written directly by nginx
            hls on;
            hls_path /tmp/hls;
            hls_fragment 2;
            hls_playlist_length 10800; # 3 hour rolling window
            hls_cleanup off;

            # Webhooks to validate stream key and signal stream end
            on_publish http://127.0.0.1:80/validate_proxy;
            on_publish_done http://127.0.0.1:80/done_proxy;
        }
    }
}

http {
    resolver 127.0.0.11;

    server {
        listen 80;

        # Serve HLS files generated by nginx-rtmp
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /tmp;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        location /stat {
            rtmp_stat all;
        }

        location /validate_proxy {
            set $backend "playbbit-api:8080";
            proxy_pass http://$backend/validate$is_args$args;
        }

        location /done_proxy {
            set $backend "playbbit-api:8080";
            proxy_pass http://$backend/done$is_args$args;
        }
    }
}
