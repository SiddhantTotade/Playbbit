version: "3.8"

services:
  ingest:
    image: tiangolo/nginx-rtmp
    ports:
      - 1935:1935
      - 1993:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - hls_data:/tmp/hls
    networks:
      - playbbit-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: playbbit_db
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - 5432:5432
    networks:
      - playbbit-network

  redis:
    image: redis:alpine
    ports:
      - 6379:6379
    networks:
      - playbbit-network

  minio:
    image: quay.io/minio/minio
    command: server /data --console-address :9001
    ports:
      - 9000:9000
      - 9001:9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_API_CORS_ALLOW_ORIGIN: ${MINIO_API_CORS_ALLOW_ORIGIN}
    volumes:
      - minio_playbbit_data:/data
    networks:
      - playbbit-network

  minio-init:
    image: minio/mc
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c " until /usr/bin/mc alias set playbbit http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do echo 'Waiting for MinIO...'; sleep 1; done; /usr/bin/mc mb playbbit/pbs || true; /usr/bin/mc anonymous set download playbbit/pbs; exit 0; "
    networks:
      - playbbit-network

networks:
  playbbit-network:
    name: playbbit-network
    driver: bridge

volumes:
  minio_playbbit_data:
  postgres_playbbit_data:
  hls_data:
    name: infra_hls_data
